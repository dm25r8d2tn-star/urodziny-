<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dla Amelii ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    overflow:hidden;
    height:100vh;
    background:linear-gradient(180deg,#ff9ac2,#ffc2da,#ffe9f3);
}

/* ===== EKRAN LOGOWANIA ===== */

#login{
    position:absolute;
    width:100%;
    height:100%;
    display:flex;
    justify-content:center;
    align-items:center;
    flex-direction:column;
    z-index:10;
}

#login h1{
    color:white;
    font-size:50px;
    margin-bottom:20px;
    text-shadow:0 0 20px hotpink;
}

#login p{
    color:white;
    font-size:22px;
    margin-bottom:20px;
}

input{
    width:220px;
    padding:15px;
    border:none;
    border-radius:12px;
    text-align:center;
    font-size:22px;
}

button{
    margin-top:20px;
    padding:15px 35px;
    border:none;
    border-radius:12px;
    background:#ff2e63;
    color:white;
    font-size:22px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.08);
}

#blad{
    margin-top:15px;
    color:white;
    font-size:20px;
}

/* ===== GŁÓWNA STRONA ===== */

#main{
    display:none;
    width:100%;
    height:100%;
    justify-content:center;
    align-items:center;
}

.box{
    text-align:center;
    z-index:20;
}

.box h1{
    font-size:60px;
    color:white;
    text-shadow:0 0 15px deeppink;
    animation:pulse 2s infinite;
}

.box p{
    margin-top:20px;
    color:white;
    font-size:24px;
}

/* ===== SPADAJĄCE SERCA ===== */

.heart{
    position:absolute;
    top:-50px;
    pointer-events:none;
    animation:fall linear forwards;
}

/* ===== GWIAZDKI ===== */

.star{
    position:absolute;
    color:white;
    animation:blink 2s infinite;
    pointer-events:none;
}

/* ===== ANIMACJE ===== */

@keyframes pulse{
    0%,100%{transform:scale(1);}
    50%{transform:scale(1.08);}
}

@keyframes blink{
    0%,100%{opacity:.2;}
    50%{opacity:1;}
}

@keyframes fall{
    from{
        transform:translateY(-60px) rotate(0deg);
    }
    to{
        transform:translateY(110vh) rotate(360deg);
    }
}
#koperta{
    position:relative;
    width:320px;
    height:220px;
    margin:auto;
    cursor:pointer;
}

.dol{
    position:absolute;
    width:320px;
    height:170px;
    bottom:0;
    background:#ff4f80;
    border-radius:0 0 15px 15px;
}

.gora{
    position:absolute;
    width:0;
    height:0;
    border-left:160px solid transparent;
    border-right:160px solid transparent;
    border-top:110px solid #ff7aa5;
    transform-origin:top;
    transition:1s;
    z-index:3;
}

#list{
    position:absolute;
    left:20px;
    top:50px;
    width:280px;
    height:150px;
    background:white;
    border-radius:10px;
    padding:15px;
    text-align:center;
    transition:1s;
    z-index:2;
}
</style>
</head>

<body>

<div id="login">

<h1>❤️ Tajemnicza Niespodzianka ❤️</h1>

<p>Wpisz kod</p>

<input
id="kod"
type="password"
placeholder="****">

<button onclick="sprawdz()">
Otwórz ❤️
</button>

<p id="blad"></p>

</div>

<div id="main">

<div class="box">

<div id="koperta" onclick="otworzKoperte()">

<div class="gora"></div>

<div class="dol"></div>

<div id="list">

<h2> Dla Amelii 🩷</h2>

<p>Kliknij jeszcze raz, aby otworzyć list 🩷</p>

</div>

</div>

</div>







</div>
 <script>

function sprawdz(){

    const kod=document.getElementById("kod").value;

    if(kod==="2107"){
        document.getElementById("login").style.display="none";
        document.getElementById("main").style.display="flex";
    }else{
        document.getElementById("blad").innerHTML="❌ Niepoprawny kod!";
    }

}

function serce(){

    const h=document.createElement("div");

    h.className="heart";
    h.innerHTML=["❤️","💖","💕","💗"][Math.floor(Math.random()*4)];

    h.style.left=Math.random()*100+"vw";
    h.style.fontSize=(20+Math.random()*30)+"px";
    h.style.animationDuration=(4+Math.random()*4)+"s";

    document.body.appendChild(h);

    setTimeout(()=>h.remove(),8000);

}

setInterval(serce,250);

function gwiazdka(){

    const s=document.createElement("div");

    s.className="star";
    s.innerHTML="✨";

    s.style.left=Math.random()*100+"vw";
    s.style.top=Math.random()*100+"vh";
    s.style.fontSize=(10+Math.random()*20)+"px";

    document.body.appendChild(s);

    setTimeout(()=>s.remove(),2500);

}

setInterval(gwiazdka,300);
function otworzKoperte(){

    document.querySelector(".gora").style.transform = "rotateX(180deg)";

    document.getElementById("list").style.top = "-80px";
setTimeout(() => {
    document.getElementById("list").innerHTML = `
        <h2> Dla Amelii 🩷</h2>
        <p>Wszystkiego najlepszego myszko! 🩷</p>
        <p>Dziękuję, że jesteś. Mam nadzieję, że ten dzień będzie dla Ciebie wyjątkowy. 🩷</p>
        <p>Kocham Cię! 🩷</p>
    `;
}, 1200);
}
</script>

</body>
</html>
