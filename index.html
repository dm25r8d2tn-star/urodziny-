<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dla Amelii ❤️</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

html,body{
width:100%;
height:100%;
overflow:hidden;
background:#000;
color:#fff;
}

body{
position:relative;
}

.screen{
position:absolute;
inset:0;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:#000;
transition:1s;
}

.hidden{
opacity:0;
pointer-events:none;
}

/* -------------------- */
/* LOGIN */
/* -------------------- */

#login h1{

font-size:40px;

margin-bottom:35px;

font-weight:600;

letter-spacing:2px;

}

#kod{

width:240px;

padding:18px;

font-size:30px;

text-align:center;

border-radius:18px;

border:2px solid white;

background:#111;

color:white;

outline:none;

}

#otworz{

margin-top:25px;

padding:15px 45px;

font-size:22px;

border-radius:16px;

border:none;

cursor:pointer;

background:white;

color:black;

font-weight:600;

transition:.3s;

}

#otworz:hover{

transform:scale(1.05);

}

#blad{

margin-top:18px;

color:#ff6f6f;

font-size:18px;

}

/* -------------------- */
/* ŻYCZENIA */
/* -------------------- */

#zyczenia{

display:none;

text-align:center;

padding:40px;

}

#zyczenia h1{

font-size:48px;

line-height:1.6;

font-weight:700;

text-shadow:0 0 25px rgba(255,255,255,.35);

}

/* -------------------- */
/* FILM */
/* -------------------- */

#film{

display:none;

overflow:hidden;

}

#film img{

position:absolute;

width:280px;

height:380px;

object-fit:cover;

border-radius:18px;

border:5px solid white;

box-shadow:0 0 40px rgba(255,255,255,.2);

opacity:0;

transition:1.3s;

}

/* -------------------- */
/* KOPERTA */
/* -------------------- */

#kopertaScreen{

display:none;

}

#koperta{

position:relative;

width:330px;

height:220px;

cursor:pointer;

}

#kopertaDol{

position:absolute;

bottom:0;

width:330px;

height:170px;

background:#111;

border:2px solid #444;

border-radius:0 0 16px 16px;

}

#klapka{

position:absolute;

width:0;

height:0;

border-left:165px solid transparent;

border-right:165px solid transparent;

border-top:110px solid #222;

transform-origin:top;

transition:1s;

z-index:5;

}

#list{

position:absolute;

left:20px;

top:70px;

width:290px;

height:185px;

background:white;

color:black;

border-radius:12px;

padding:18px;

text-align:center;

line-height:1.5;

font-size:18px;

transform:translateY(95px);

transition:1s;

z-index:2;

}

#dalej{

margin-top:18px;

padding:12px 30px;

background:black;

color:white;

border:none;

border-radius:12px;

cursor:pointer;

font-size:18px;

}

#koniec{

display:none;

font-size:58px;

font-weight:700;

letter-spacing:3px;

text-align:center;

text-shadow:0 0 25px rgba(255,255,255,.4);

}
/* -------------------- */
/* ANIMACJE */
/* -------------------- */

@keyframes fadeIn{

from{
opacity:0;
transform:scale(.95);
}

to{
opacity:1;
transform:scale(1);
}

}

@keyframes fadeOut{

from{
opacity:1;
}

to{
opacity:0;
}

}

@keyframes zoom{

0%{
transform:scale(.9);
opacity:0;
}

15%{
opacity:1;
}

85%{
opacity:1;
}

100%{
transform:scale(1.1);
opacity:0;
}

}

@keyframes flash{

0%,100%{
opacity:0;
}

50%{
opacity:.08;
}

}

.flash{

position:absolute;

inset:0;

background:white;

opacity:0;

pointer-events:none;

animation:flash 4s infinite;

mix-blend-mode:screen;

}

.grain{

position:absolute;

inset:0;

opacity:.05;

background-image:
radial-gradient(circle,#fff 1px,transparent 1px);

background-size:6px 6px;

pointer-events:none;

}

</style>

</head>

<body>

<div class="flash"></div>

<div class="grain"></div>

<!-- LOGIN -->

<div id="login" class="screen">

<h1>🔒 Wpisz kod 🔒</h1>

<input
id="kod"
type="password"
maxlength="4"
placeholder="2107">

<button id="otworz">
Otwórz ❤️
</button>

<p id="blad"></p>

</div>

<!-- ŻYCZENIA -->

<div id="zyczenia" class="screen">

<h1>

Wszystkiego najlepszego myszko!! ❤️

<br><br>

Kocham Cię mocno!! ❤️

</h1>

</div>

<!-- FILM -->

<div id="film" class="screen"></div>

<!-- KOPERTA -->

<div id="kopertaScreen" class="screen">

<div id="koperta">

<div id="klapka"></div>

<div id="kopertaDol"></div>

<div id="list">

💌

<br><br>

Życzę Ci żebyś zawsze miała przy sobie ludzi którzy będą kochać Cię tak mocno jak na to zasługujesz i żebyś nigdy nie zapomniała jaka jesteś wyjątkowa ❤️

<br><br>

<button id="dalej">

Zamknij ❤️

</button>

</div>

</div>

</div>

<div id="koniec" class="screen">

hbd bby lovu 🤍

</div>

<script>
// =========================
// ELEMENTY
// =========================

const login = document.getElementById("login");
const zyczenia = document.getElementById("zyczenia");
const film = document.getElementById("film");
const kopertaScreen = document.getElementById("kopertaScreen");
const koniec = document.getElementById("koniec");

const kod = document.getElementById("kod");
const otworz = document.getElementById("otworz");
const blad = document.getElementById("blad");

const klapka = document.getElementById("klapka");
const list = document.getElementById("list");
const dalej = document.getElementById("dalej");

// =========================
// ZDJĘCIA
// =========================

const zdjecia = [

"1.jpg",
"2.jpg",
"3.jpg",
"4.jpg",
"5.jpg",
"6.jpg",
"7.jpg",
"8.jpg",
"9.jpg",
"10.jpg",
"11.jpg",
"12.jpg",
"13.jpg",
"14.jpg",
"15.jpg",
"16.jpg",
"17.jpg",
"18.jpg",
"19.jpg",
"20.jpg"

];

// =========================
// LOGOWANIE
// =========================

otworz.onclick = ()=>{

if(kod.value!="2107"){

blad.innerHTML="Niepoprawny kod ❤️";

return;

}

login.style.display="none";

zyczenia.style.display="flex";

setTimeout(()=>{

zyczenia.style.display="none";

film.style.display="flex";

startFilm();

},4500);

};

// =========================
// FILM
// =========================

let indeks=0;

function startFilm(){

pokazZdjecie();

}

function pokazZdjecie(){

if(indeks>=zdjecia.length){

film.style.display="none";

kopertaScreen.style.display="flex";

return;

}

const img=document.createElement("img");

img.src=zdjecia[indeks];

img.style.left="50%";
img.style.top="50%";
img.style.transform="translate(-50%,-50%) scale(.9)";
img.style.animation="zoom 3.5s linear";

film.appendChild(img);

setTimeout(()=>{

img.remove();

indeks++;

pokazZdjecie();

},3500);

}
// =========================
// KOPERTA
// =========================

let otwarta = false;

document.getElementById("koperta").onclick = function(){

    if(otwarta) return;

    otwarta = true;

    klapka.style.transform = "rotateX(180deg)";

    setTimeout(()=>{

        list.style.transform = "translateY(-120px)";

    },500);

};

// =========================
// ZAKOŃCZENIE
// =========================

dalej.onclick = ()=>{

    list.style.opacity="0";

    klapka.style.opacity="0";

    setTimeout(()=>{

        kopertaScreen.style.display="none";

        koniec.style.display="flex";

        koniec.style.animation="fadeIn 2s forwards";

    },1200);

};

// =========================
// DODATKOWY EFEKT FILMU
// =========================

setInterval(()=>{

    if(film.style.display==="flex"){

        film.style.filter="brightness(.95)";

        setTimeout(()=>{

            film.style.filter="brightness(1)";

        },120);

    }

},3500);

// =========================
// LOSOWY OBRÓT ZDJĘĆ
// =========================

const staryPokaz = pokazZdjecie;

pokazZdjecie = function(){

    if(indeks>=zdjecia.length){

        film.style.display="none";

        kopertaScreen.style.display="flex";

        return;

    }

    const img=document.createElement("img");

    img.src=zdjecia[indeks];

    img.style.left="50%";
    img.style.top="50%";

    const rot=(Math.random()*10)-5;

    img.style.transform=`translate(-50%,-50%) rotate(${rot}deg) scale(.9)`;

    img.style.animation="zoom 3.5s linear";

    film.appendChild(img);

    setTimeout(()=>{

        img.remove();

        indeks++;

        pokazZdjecie();

    },3500);

};
// =========================
// START
// =========================

kod.addEventListener("keydown",(e)=>{

    if(e.key==="Enter"){

        otworz.click();

    }

});

// ustaw fokus na pole z kodem
kod.focus();

</script>

</body>
</html>
